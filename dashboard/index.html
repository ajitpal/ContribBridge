<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContribBridge / Control Center</title>
    <link rel="icon" href="https://lingo.dev/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030503;
            --surface: #0a0c0a;
            --surface-bright: #101410;
            --border: #1a221a;
            --border2: #243022;
            --primary: #39ff7a;
            --primary-dim: rgba(57, 255, 122, 0.06);
            --primary-glow: rgba(57, 255, 122, 0.3);
            --text: #e0eee0;
            --text-dim: #7a9a7a;
            --danger: #ef4444;
            --accent: #39ff7a;
            --btn-text: #080a08;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #ffffff;
            --surface: #f6f8fa;
            --surface-bright: #ffffff;
            --border: #d0d7de;
            --border2: #afb8c1;
            --primary: #117131;
            --primary-dim: rgba(17, 113, 49, 0.05);
            --text: #1a1f1a;
            --text-dim: #57606a;
            --accent: #117131;
            --btn-text: #ffffff;
            --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        /* --- Header --- */
        header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            background: rgba(3, 5, 3, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
        }
        body.light-theme header { background: rgba(255, 255, 255, 0.85); }

        .logo {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--surface-bright);
            border: 1px solid var(--border);
        }
        #dot { width: 5px; height: 5px; border-radius: 50%; background: var(--danger); }
        #dot.online { background: var(--primary); box-shadow: 0 0 6px var(--primary); }

        /* --- Layout --- */
        main {
            display: grid;
            grid-template-columns: 240px 1fr 280px;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar & Right Panel --- */
        aside, .activity-panel {
            border-right: 1px solid var(--border);
            background: var(--surface);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .activity-panel { border-right: none; border-left: 1px solid var(--border); }

        h2 { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; font-weight: 700; }

        .stat-section { margin-bottom: 24px; }
        .stat-list { list-style: none; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 0.75rem;
        }
        .stat-val { color: var(--text-dim); font-family: var(--font-mono); font-weight: 500; }

        /* --- Analytics Widgets --- */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
        .widget {
            background: var(--surface-bright);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .widget-label { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; font-weight: 600; }
        .widget-val { font-size: 0.85rem; font-weight: 700; }

        /* --- Feed --- */
        #feed-container {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
        }
        #feed-view { max-width: 850px; width: 100%; display: flex; flex-direction: column; gap: 12px; }

        /* --- Cards (Sophisticated Minimalist) --- */
        .card {
            background: var(--surface);
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: var(--border2); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--text); flex: 1; }
        .card-meta { font-size: 0.6rem; color: var(--text-dim); font-family: var(--font-mono); }

        .lang-badges { display: flex; gap: 4px; }
        .lang-badge {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--surface-bright);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .lang-badge.active { color: var(--primary); border-color: var(--primary-dim); }

        .issue-link { text-decoration: none; color: inherit; }
        .issue-link:hover .card-title { color: var(--primary); }

        /* Original Text Block */
        .quote-block {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-style: italic;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            margin-bottom: 8px;
            line-height: 1.5;
            position: relative;
        }
        .quote-block::before {
            content: '"';
            position: absolute;
            left: 4px;
            top: 4px;
            opacity: 0.2;
            font-size: 1.5rem;
            font-family: serif;
        }

        /* Translation Block */
        .trans-block {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 12px;
            color: var(--text);
            padding: 6px 12px;
            border-left: 2px solid var(--primary);
            display: flex;
            gap: 8px;
        }
        .cb-label { color: var(--primary); font-weight: 700; font-size: 0.75rem; flex-shrink: 0; }

        /* Footer & Labels */
        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
        .tags { display: flex; gap: 6px; }
        .tag {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tag-review { background: rgba(255, 171, 0, 0.1); color: #ffab00; border: 1px solid rgba(255, 171, 0, 0.2); }
        .tag-bug { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .tag-feature { background: rgba(57, 255, 122, 0.1); color: var(--primary); border: 1px solid var(--primary-dim); }
        .tag-default { background: var(--surface-bright); color: var(--text-dim); border: 1px solid var(--border); }
        
        .user-tag { font-size: 0.65rem; color: var(--text-dim); font-family: var(--font-mono); }

        /* Confidence Strip */
        .conf-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--border);
        }
        .conf-bar {
            height: 100%;
            background: var(--primary);
            transition: width 1s ease-out;
        }
        .conf-text {
            font-size: 0.55rem;
            color: var(--text-dim);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Bidirectional Reply Card */
        .card.reply { border-left: 3px solid var(--accent); }
        .card.reply .card-lang { background: rgba(10, 132, 255, 0.1); color: var(--accent); }

        /* --- Replie Container (Accordion) --- */
        .replies-container { margin-top: 20px; background: var(--surface-bright); border-radius: 8px; overflow: hidden; }
        .replies-header { padding: 12px 16px; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .replies-content { display: none; padding: 0 16px 16px 16px; border-top: 1px solid var(--border); }
        .replies-content.open { display: block; }

        .reply-item { margin-top: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .reply-item:last-child { border-bottom: none; }
        .reply-meta { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 6px; display: flex; justify-content: space-between; }

        /* --- Activity Log --- */
        .log-entry { font-family: var(--font-mono); font-size: 0.65rem; padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.4; color: var(--text-dim); }
        .log-time { color: var(--primary); opacity: 0.7; margin-right: 6px; }
        .log-dir { color: var(--primary); margin-right: 6px; font-weight: 600; }
        .log-conf { color: var(--text); }

        /* --- Footer (Playground) --- */
        footer {
            height: 70px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: var(--surface);
        }
        .playground-bar { display: flex; width: 100%; max-width: 1000px; margin: 0 auto; gap: 15px; align-items: center; }
        .play-input {
            flex: 1;
            background: var(--surface-bright);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }
        .play-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
        .btn-send {
            background: var(--primary);
            color: var(--btn-text);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-send.active { opacity: 1; pointer-events: auto; transform: scale(1.05); }

        /* --- Utilities --- */
        .empty-state { font-size: 0.75rem; color: var(--text-dim); text-align: center; padding: 40px; opacity: 0.6; }
        .btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; transition: var(--transition); }
        .btn-icon:hover { color: var(--text); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .new-entry { animation: fadeIn 0.4s cubic-bezier(0.19, 1, 0.22, 1); }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="location.href='/'">
            <span>🌉</span> CONTRIBBRIDGE / HUB
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="status-pill" class="status-pill">
                <span id="dot"></span>
                <span id="status-text">DISCONNECTED</span>
            </div>
            <button class="btn-icon" id="theme-toggle" title="Toggle Theme">🌓</button>
        </div>
    </header>

    <main>
        <aside>
            <div class="stat-section">
                <h2>Repositories</h2>
                <ul id="repo-list" class="stat-list"></ul>
            </div>
            <div class="stat-section">
                <h2>Languages</h2>
                <ul id="lang-list" class="stat-list"></ul>
            </div>
            
            <div class="stat-section" style="margin-top: auto;">
                <h2>Link New Repository</h2>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" id="repo-conn" class="play-input" placeholder="owner/repo" style="font-size: 0.75rem; padding: 10px;">
                    <select id="locale-select" class="play-input" style="font-size: 0.75rem; padding: 10px;">
                        <option value="en">English (EN)</option>
                        <option value="de">German (DE)</option>
                        <option value="hi">Hindi (HI)</option>
                        <option value="es">Spanish (ES)</option>
                        <option value="fr">French (FR)</option>
                    </select>
                    <button onclick="connectRepo()" class="play-input" style="background: var(--primary); color: var(--btn-text); font-weight: 700; cursor: pointer;">CONNECT</button>
                </div>
            </div>

            <div class="analytics-grid">
                <div class="widget">
                    <div class="widget-label">Time Saved</div>
                    <div id="time-saved" class="widget-val">0h 0m</div>
                </div>
                <div class="widget">
                    <div class="widget-label">Uplinks</div>
                    <div id="uplinks-24h" class="widget-val">0</div>
                </div>
            </div>
        </aside>

        <section id="feed-container">
            <div id="feed-view">
                <div class="empty-state">ESTABLISHING UPLINK...</div>
            </div>
        </section>

        <section class="activity-panel">
            <h2>Live Activity Log</h2>
            <div id="activity-log" style="display: flex; flex-direction: column-reverse;"></div>
        </section>
    </main>

    <footer>
        <div class="playground-bar">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 140px; color: var(--text-dim); font-size: 0.65rem;">
                <span>🌐 AUTO-DETECT</span>
                <span style="opacity: 0.3;">→</span>
                <select id="play-locale" class="play-input" style="padding: 4px 8px; font-size: 0.65rem; border: none; background: transparent; color: var(--primary); font-weight: 700; width: auto; appearance: auto;">
                    <option value="en" selected>EN</option>
                    <option value="de">DE</option>
                    <option value="hi">HI</option>
                    <option value="es">ES</option>
                    <option value="fr">FR</option>
                    <option value="zh">ZH</option>
                </select>
            </div>
            <input type="text" id="playground" class="play-input" placeholder="Translate non-English text instantly..." oninput="checkInput(this)">
            <button id="send-btn" class="btn-send" onclick="simulate()" title="Translate"><span>→</span></button>
        </div>
    </footer>

    <script>
        const feed = document.getElementById('feed-view');
        const repoList = document.getElementById('repo-list');
        const langList = document.getElementById('lang-list');
        const activityLog = document.getElementById('activity-log');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const sendBtn = document.getElementById('send-btn');
        
        let unreadCount = 0;

        // --- Theme ---
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        };
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

        function checkInput(el) {
            sendBtn.classList.toggle('active', el.value.trim().length > 0);
        }

        // --- Notifications ---
        window.onfocus = () => { unreadCount = 0; updateTitle(); };
        function updateTitle() {
            document.title = unreadCount > 0 ? `(${unreadCount}) Hub / ContribBridge` : 'Hub / ContribBridge';
        }
        function notify(title, body) {
            if (document.hidden) {
                unreadCount++;
                updateTitle();
                if (Notification.permission === 'granted') new Notification(title, { body });
            }
        }
        if (Notification.permission === 'default') Notification.requestPermission();

        // --- WebSocket ---
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/feed`);

        ws.onopen = () => {
            dot.className = 'online';
            statusText.textContent = 'CONNECTED / LIVE';
            logActivity('SYSTEM', 'Uplink established with Lingo.dev cluster', 100);
        };

        ws.onclose = () => {
            dot.className = '';
            statusText.textContent = 'RECONNECTING...';
            setTimeout(() => window.location.reload(), 5000);
        };

        ws.onmessage = (event) => {
            try {
                const { type, data } = JSON.parse(event.data);
                console.log(`[WS] Received ${type}:`, data);

                if (type === 'history') {
                    feed.innerHTML = '';
                    if (!data.history || data.history.length === 0) {
                        feed.innerHTML = '<div class="empty-state">NO RECENT ACTIVITY</div>';
                    } else {
                        data.history.reverse().forEach(issue => renderIssue(issue));
                    }
                    if (data.commentHistory) {
                        data.commentHistory.reverse().forEach(comment => renderComment(comment));
                    }
                    updateStats(data.repoStats, data.langStats);
                }

                if (type === 'issue') {
                    console.log("[Dashboard] Rendering new issue:", data);
                    renderIssue(data);
                    logActivity(data.detectedLocale, `Translated issue #${data.number} for ${data.repo}`, data.confidence);
                    notify('New Issue', `${data.repo} #${data.number}`);
                }

                if (type === 'comment') {
                    renderComment(data);
                    logActivity(data.direction || 'EN', `Translated comment on #${data.issueNumber} by @${data.author}`, 99);
                    notify('New Comment', `${data.repo} #${data.issueNumber}`);
                }

                if (type === 'stats') updateStats(data.repoStats, data.langStats);
                
                if (type === 'playground_result') {
                    renderPlaygroundCard(data);
                    logActivity('MANUAL', 'Playground translation completed', 98);
                }

                if (type === 'delete_issue') removeIssue(data.repo, data.issueNumber);
            } catch (err) {
                console.error('[Dashboard] Error processing WebSocket message:', err);
            }
        };

        // --- Rendering ---

        function renderIssue(issue) {
            removeEmpty();
            if (document.startViewTransition) {
                document.startViewTransition(() => insertIssue(issue));
            } else {
                insertIssue(issue);
            }
        }

        function insertIssue(issue) {
            const div = document.createElement('div');
            div.className = 'card new-entry';
            div.setAttribute('data-repo', issue.repo);
            div.setAttribute('data-issue-number', issue.number);
            const labels = (issue.labels || '').split(',').filter(l => l);
            const statusTag = issue.state || 'OPEN';
            const issueUrl = `https://github.com/${issue.repo}/issues/${issue.number}`;
            const srcLoc = (issue.detectedLocale || '??').toUpperCase();
            const tgtLoc = (issue.targetLocale || 'EN').toUpperCase();
            
            const originalText = [];
            if (issue.originalTitle) originalText.push(`<strong>${issue.originalTitle}</strong>`);
            if (issue.originalBody) originalText.push(issue.originalBody);
            const originalDisplay = originalText.join('<br>') || 'No original content';

            div.innerHTML = `
                <div class="card-header">
                    <a href="${issueUrl}" target="_blank" class="issue-link">
                        <div class="card-title">
                            ${issue.labels?.includes('bug') ? '🔧 ' : '✨ '}${escape(issue.translatedTitle || issue.originalTitle)}
                        </div>
                    </a>
                    <div class="lang-badges">
                        <span class="lang-badge">${srcLoc}</span>
                        <span class="lang-badge active">${srcLoc}→${tgtLoc}</span>
                    </div>
                </div>
                
                <div class="quote-block">
                    ${originalDisplay}
                </div>

                <div class="trans-block">
                    <span class="cb-label">▶ ContribBridge</span>
                    <span>${escape(issue.translatedBody)}</span>
                </div>
                
                <div class="card-footer">
                    <div class="tags">
                        <span class="tag tag-review">REVIEW</span>
                        ${labels.map(l => `<span class="tag tag-${l === 'bug' ? 'bug' : 'default'}">${l.toUpperCase()}</span>`).join('')}
                    </div>
                    <div class="user-tag">@${issue.author || 'contributor'}</div>
                </div>

                <div class="conf-text">
                    <span>Lingo.dev confidence</span>
                    <span style="color: var(--primary); font-weight: 700;">${issue.confidence || 98}%</span>
                </div>

                <div class="conf-strip">
                    <div class="conf-bar" style="width: 0%" data-w="${issue.confidence || 98}%"></div>
                </div>

                <div class="replies-container" id="replies-${issue.repo.replace('/','-')}-${issue.number}" style="${issue.commentCount > 0 ? '' : 'display:none'}">
                    <div class="replies-header" onclick="toggleReplies(this)">
                        <span>RELATED DISCUSSIONS</span>
                        <span class="reply-count">${issue.commentCount || 0}</span>
                    </div>
                    <div class="replies-content"></div>
                </div>
            `;
            feed.prepend(div);

            setTimeout(() => {
                const bar = div.querySelector('.conf-bar');
                if (bar) bar.style.width = bar.getAttribute('data-w');
            }, 100);
        }

        function renderComment(comment) {
            removeEmpty();
            const containerId = `replies-${comment.repo.replace('/','-')}-${comment.issueNumber}`;
            const container = document.getElementById(containerId);

            if (container) {
                const content = container.querySelector('.replies-content');
                const badge = container.querySelector('.reply-count');
                const item = document.createElement('div');
                item.className = 'reply-item';
                item.innerHTML = `
                    <div class="reply-meta">
                        <span><strong>@${comment.author}</strong></span>
                        <span>${formatDate(comment.timestamp)}</span>
                    </div>
                    <div style="font-size: 0.8rem; line-height: 1.5;">${escape(comment.translatedBody)}</div>
                `;
                content.appendChild(item);
                badge.textContent = content.children.length;
            } else {
                insertStandaloneReply(comment);
            }
        }

        function insertStandaloneReply(comment) {
            removeEmpty();
            const div = document.createElement('div');
            div.className = 'card reply new-entry';
            const dir = (comment.direction || '??').toUpperCase();
            
            div.innerHTML = `
                <div class="card-header">
                    <div class="card-title">💬 Comment on #${comment.issueNumber}</div>
                    <div class="lang-badges">
                        <span class="lang-badge active">${dir}</span>
                    </div>
                </div>

                <div class="quote-block">
                    ${escape(comment.originalBody)}
                </div>
                
                <div class="trans-block">
                    <span class="cb-label">▶ ContribBridge</span>
                    <span>${escape(comment.translatedBody)}</span>
                </div>
                
                <div class="card-footer">
                    <div class="tags">
                        <span class="tag tag-default">REPLY</span>
                    </div>
                    <div class="user-tag">@${comment.author}</div>
                </div>
                <div class="conf-strip" style="background: var(--primary-dim);"><div class="conf-bar" style="width: 100%"></div></div>
            `;
            feed.prepend(div);
        }

        function renderPlaygroundCard(data) {
            removeEmpty();
            const div = document.createElement('div');
            div.className = 'card new-entry';
            div.style.borderLeft = '4px solid var(--primary)';
            div.innerHTML = `
                <div class="card-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.1rem;">🧪</span>
                        <div class="card-title" style="margin-bottom: 0;">Playground Translation</div>
                    </div>
                    <span class="card-lang" style="background: var(--primary); color: var(--btn-text);">PL-EN</span>
                </div>
                
                <div class="context-zone">
                    <span style="opacity: 0.3; margin-right: 5px;">"</span>
                    ${escape(data.original)}
                </div>

                <div class="result-zone">
                    <span><span class="cb-mark">▶ ContribBridge</span> <span style="font-weight: 600;">${escape(data.translated)}</span></span>
                </div>
                
                <div class="card-footer">
                    <div class="tag-row">
                        <span class="tag tag-feat">PLAYGROUND</span>
                    </div>
                    <div class="issue-by">@you</div>
                </div>
            `;
            feed.prepend(div);
        }

        function logActivity(lang, msg, conf) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-dir">[${lang}]</span><span class="log-msg">${msg}</span><span class="log-conf"> (${conf}%)</span>`;
            activityLog.appendChild(entry);
            if (activityLog.children.length > 50) activityLog.firstChild.remove();
        }

        function toggleReplies(el) {
            el.nextElementSibling.classList.toggle('open');
        }

        function updateStats(repos, langs) {
            repoList.innerHTML = repos.map(r => `
                <li class="stat-item"><span>${r.repo}</span><span class="stat-val">${r.count}</span></li>
            `).join('');
            langList.innerHTML = langs.map(l => `
                <li class="stat-item"><span>${l.lang.toUpperCase()}</span><span class="stat-val">${l.count}</span></li>
            `).join('');

            const total = repos.reduce((s, r) => s + r.count, 0);
            document.getElementById('time-saved').textContent = `${Math.floor(total * 5 / 60)}h ${total * 5 % 60}m`;
            document.getElementById('uplinks-24h').textContent = total;
        }

        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();
        }

        function removeEmpty() { const e = feed.querySelector('.empty-state'); if (e) e.remove(); }
        function removeIssue(repo, num) {
            const cards = feed.querySelectorAll(`.card[data-repo="${repo}"][data-issue-number="${num}"]`);
            cards.forEach(c => c.remove());
        }

        function escape(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function simulate() {
            const el = document.getElementById('playground');
            const target = document.getElementById('play-locale').value;
            const val = el.value.trim();
            if (!val || sendBtn.disabled) return;

            // Guardrail: Loading State
            const originalIcon = sendBtn.innerHTML;
            sendBtn.innerHTML = '<span class="spinner" style="width:12px; height:12px; border-width:2px; display:inline-block"></span>';
            sendBtn.disabled = true;
            el.disabled = true;

            try {
                const res = await fetch('/api/playground', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: val, target_locale: target })
                });
                
                if (res.status === 429) {
                    el.value = '';
                    el.placeholder = 'RATE LIMIT EXCEEDED // SLOW DOWN';
                    setTimeout(() => el.placeholder = 'Translate non-English text instantly...', 3000);
                } else if (res.ok) {
                    el.value = '';
                }
            } catch (err) {
                console.error('Playground failure:', err);
            } finally {
                sendBtn.innerHTML = originalIcon;
                sendBtn.disabled = false;
                el.disabled = false;
                checkInput(el);
            }
        }

        async function connectRepo() {
            const btn = event?.target || document.querySelector('button[onclick="connectRepo()"]');
            const repoInput = document.getElementById('repo-conn');
            const repo = repoInput.value.trim();
            const locale = document.getElementById('locale-select').value;
            
            if (!repo || btn.disabled) return;

            // Guardrail: Loading State
            const originalText = btn.textContent;
            btn.textContent = 'CONNECTING...';
            btn.disabled = true;
            repoInput.disabled = true;

            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo, target_locale: locale })
                });
                
                if (res.ok) {
                    repoInput.value = '';
                    logActivity('SYSTEM', `Linked ${repo} (${locale.toUpperCase()})`, 100);
                } else {
                    const data = await res.json();
                    repoInput.placeholder = `ERROR: ${data.error?.toUpperCase() || 'FAILED'}`;
                    setTimeout(() => repoInput.placeholder = 'owner/repo', 3000);
                }
            } catch (err) {
                console.error('Connection failure:', err);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                repoInput.disabled = false;
            }
        }
    </script>
</body>
</html>
