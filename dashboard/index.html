<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContribBridge | Live Translation Feed</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --dim: #94a3b8;
            --primary: #38bdf8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
        #status { font-size: 0.8rem; color: #22c55e; }
        
        #feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .issue-card {
            background: var(--card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .issue-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .lang-tag {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        
        .issue-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text);
            display: block;
            margin-top: 5px;
        }
        
        .issue-orig {
            font-style: italic;
            color: var(--dim);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .issue-body {
            line-height: 1.5;
            white-space: pre-wrap;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        
        .issue-meta {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--dim);
            display: flex;
            justify-content: space-between;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--dim);
        }
    </style>
</head>
<body>
    <header>
        <h1>ContribBridge Live Feed</h1>
        <div id="status">● Connected</div>
    </header>

    <div id="feed">
        <div class="empty-state">Waiting for GitHub issues...</div>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const status = document.getElementById('status');
        
        // Connect to WebSocket feed
        const ws = new WebSocket(`ws://${location.host}/feed`);

        ws.onopen = () => {
            status.textContent = '● Connected';
            status.style.color = '#22c55e';
        };

        ws.onclose = () => {
            status.textContent = '○ Disconnected';
            status.style.color = '#ef4444';
            setTimeout(() => location.reload(), 3000);
        };

        ws.onmessage = (event) => {
            const { type, data } = JSON.parse(event.data);
            if (type === 'issue') {
                // Remove empty state on first issue
                const empty = feed.querySelector('.empty-state');
                if (empty) empty.remove();
                
                renderIssueCard(data);
            }
        };

        function renderIssueCard(issue) {
            const card = document.createElement('div');
            card.className = 'issue-card';
            card.innerHTML = `
                <div class="issue-header">
                    <span class="lang-tag">${issue.detectedLocale} → EN</span>
                    <span style="font-size: 0.8rem; color: var(--dim)">#${issue.number}</span>
                </div>
                <span class="issue-title">${escapeHtml(issue.translatedTitle)}</span>
                <div class="issue-orig">Original: ${escapeHtml(issue.originalTitle)}</div>
                <div class="issue-body">${escapeHtml(issue.translatedBody)}</div>
                <div class="issue-meta">
                    <span>@${issue.author} · ${issue.repo}</span>
                    <span>${issue.confidence}% confidence · ${issue.translationMs}ms</span>
                </div>
            `;
            feed.prepend(card);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
