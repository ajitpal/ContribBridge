<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContribBridge | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050705;
            --surface: #0a0d0a;
            --surface-bright: #101510;
            --border: #1a251a;
            --primary: #39ff7a;
            --primary-glow: rgba(57, 255, 122, 0.4);
            --primary-dim: rgba(57, 255, 122, 0.1);
            --text: #dcfce7;
            --text-dim: #4ade80;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            height: 60px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--surface);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .brand {
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border: 1px solid var(--primary-dim);
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
        }

        /* Sidebar Stats */
        aside {
            border-right: 2px solid var(--border);
            background: var(--surface);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        .stat-section h3 {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 4px;
            background: var(--surface-bright);
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .stat-item:hover {
            border-color: var(--primary-dim);
            background: var(--primary-dim);
        }

        .stat-val {
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Feed */
        #feed-view {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: radial-gradient(circle at center, #0a0d0a 0%, #050705 100%);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            position: relative;
            transition: transform 0.2s;
            animation: bootIn 0.4s ease-out;
        }

        @keyframes bootIn {
            from {
                opacity: 0;
                transform: scale(0.98);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .card.reply::before {
            background: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .card-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Footer Playground */
        footer {
            height: 100px;
            border-top: 2px solid var(--border);
            background: var(--surface);
            padding: 15px 40px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .play-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--primary);
            font-family: inherit;
            border-radius: 4px;
            outline: none;
        }

        .play-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-dim);
        }

        .btn-play {
            padding: 12px 24px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-play:hover {
            background: var(--text-dim);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-ghost {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ghost:hover {
            color: var(--text);
        }

        .health-bar-container {
            margin-top: 8px;
            height: 4px;
            background: var(--surface-bright);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .health-bar {
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transition: width 0.5s ease;
        }

        .health-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .health-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .tag {
            background: var(--surface-bright);
            border: 1px solid var(--border);
            padding: 2px 8px;
            font-size: 0.65rem;
            border-radius: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .tag.issue-type {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.4);
        }

        .playground-bar {
            background: var(--surface-bright);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-dim);
            opacity: 0.3;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border2);
        }
    </style>
</head>

<body>
    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn-ghost" onclick="location.href='/'">← EXIT</button>
            <div class="brand">
                <span style="font-size: 1.5rem">🌉</span>
                CONTRIBBRIDGE / CONTROL CENTER
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-outline" onclick="clearFeed()">☒ Clear Feed</button>

            <div id="status-pill">
                <span id="dot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--danger)"></span>
                <span id="status-text">OFFLINE</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside>
            <div class="stat-section">
                <h3><span style="font-size: 1rem">📦</span> Repositories</h3>
                <ul class="stat-list" id="repo-list">
                    <li class="empty-state" style="padding: 10px 0; font-size: 0.8rem">No data...</li>
                </ul>
            </div>
            <div class="stat-section">
                <h3><span style="font-size: 1rem">🌐</span> Languages</h3>
                <ul class="stat-list" id="lang-list">
                    <li class="empty-state" style="padding: 10px 0; font-size: 0.8rem">No data...</li>
                </ul>
            </div>

            <div class="stat-section" style="margin-top: 20px;">
                <h3><span style="font-size: 1rem">📊</span> Translation Health</h3>
                <div class="health-item">
                    <div class="health-label"><span>CONFIDENCE</span> <span id="conf-val">94%</span></div>
                    <div class="health-bar-container">
                        <div class="health-bar" id="conf-bar" style="width: 94%"></div>
                    </div>
                </div>
                <div class="health-item">
                    <div class="health-label"><span>CONTEXT</span> <span id="cont-val">88%</span></div>
                    <div class="health-bar-container">
                        <div class="health-bar" id="cont-bar"
                            style="width: 88%; background: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.4);"></div>
                    </div>
                </div>
            </div>

            <div class="stat-section" style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px;">
                <h3><span style="font-size: 1rem">🔗</span> Link Repository</h3>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="repo-conn" class="play-input" placeholder="org/repo"
                        style="padding: 8px; font-size: 0.75rem;">
                    <button class="btn-play" onclick="connectRepo()"
                        style="padding: 8px 12px; font-size: 0.75rem;">LINK</button>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                    <span style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; white-space: nowrap;">MY LOCALE</span>
                    <select id="locale-select" class="play-input" style="padding: 6px; font-size: 0.7rem; width: 100%; cursor: pointer; appearance: auto;">
                        <option value="en">🇬🇧 English (EN)</option>
                        <option value="es">🇪🇸 Spanish (ES)</option>
                        <option value="de">🇩🇪 German (DE)</option>
                        <option value="fr">🇫🇷 French (FR)</option>
                        <option value="pt">🇧🇷 Portuguese (PT)</option>
                        <option value="zh">🇨🇳 Chinese (ZH)</option>
                        <option value="ja">🇯🇵 Japanese (JA)</option>
                        <option value="hi">🇮🇳 Hindi (HI)</option>
                        <option value="ko">🇰🇷 Korean (KO)</option>
                        <option value="ar">🇸🇦 Arabic (AR)</option>
                        <option value="ru">🇷🇺 Russian (RU)</option>
                    </select>
                </div>
                <div id="conn-msg"
                    style="font-size: 0.6rem; margin-top: 8px; color: var(--text-dim); text-transform: uppercase;">
                </div>
            </div>
        </aside>

        <section id="feed-view">
            <div class="empty-state">WAITING FOR UPLINK...</div>
        </section>
    </div>

    <footer>
        <div class="playground-bar">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 140px;">
                <span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">🌐
                    AUTO-DETECT</span>
                <span style="color: var(--border)">→</span>
                <span style="font-size: 0.7rem; color: var(--primary); font-weight: 600;">EN</span>
            </div>
            <input type="text" id="playground" class="play-input"
                placeholder="Paste issue text in any language - watch it translate live..."
                style="border: none; background: transparent;">
            <button class="btn-play" onclick="simulate()" style="padding: 10px 15px;">
                <span style="font-size: 1rem">→</span>
            </button>
        </div>
    </footer>

    <script>
        const feed = document.getElementById('feed-view');
        const repoList = document.getElementById('repo-list');
        const langList = document.getElementById('lang-list');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');

        // Dynamic WebSocket URL
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/feed`);

        ws.onopen = () => {
            dot.style.background = '#39ff7a';
            dot.style.boxShadow = '0 0 10px #39ff7a';
            statusText.textContent = 'CONNECTED / LIVE';
        };

        ws.onclose = () => {
            dot.style.background = '#ef4444';
            statusText.textContent = 'DISCONNECTED';
            setTimeout(() => window.location.reload(), 5000);
        };

        ws.onmessage = (event) => {
            const { type, data } = JSON.parse(event.data);

            if (type === 'history') {
                feed.innerHTML = '';
                if (data.history.length === 0) {
                    feed.innerHTML = '<div class="empty-state">DATABASE EMPTY / WAITING FOR TRAFFIC</div>';
                }
                data.history.reverse().forEach(issue => renderIssue(issue));
                updateStats(data.repoStats, data.langStats, data.health);
            }

            if (type === 'issue') {
                renderIssue(data);
            }

            if (type === 'comment') {
                renderComment(data);
            }

            if (type === 'stats') {
                updateStats(data.repoStats, data.langStats, data.health);
            }

            if (type === 'playground_result') {
                renderPlaygroundResult(data);
            }
        };

        function renderIssue(issue) {
            removeEmpty();
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-header">
                    <span>
                        <a href="https://github.com/${issue.repo}/issues/${issue.number}" target="_blank" style="color: inherit; text-decoration: none;">
                            ISSUE #${issue.number}
                        </a>
                    </span>
                    <span style="background: var(--surface-bright); padding: 2px 6px; border-radius: 2px; font-size: 0.6rem; color: var(--primary);">
                        ${(issue.detectedLocale || '??').toUpperCase()} → ${(issue.targetLocale || 'EN').toUpperCase()}
                    </span>
                    <span>${formatDate(issue.timestamp)}</span>
                </div>
                <div class="card-title">
                    <span style="margin-right: 8px;">${issue.labels?.some(l => l.toLowerCase().includes('bug')) ? '🐛' : '💡'}</span>
                    ${escape(issue.translatedTitle)}
                </div>
                <div class="card-body">"${escape(issue.translatedBody)}"</div>
                <div class="tag-container" id="tags-${issue.id}">
                    ${(issue.labels || []).map(label => `<span class="tag ${label.toLowerCase().includes('bug') ? 'issue-type' : ''}">${escape(label)}</span>`).join('')}
                </div>
                <div class="card-meta" style="margin-top: 15px;">
                    <span><strong>REPO:</strong> ${issue.repo}</span>
                    <span><strong>CONF:</strong> ${issue.confidence || 98}%</span>
                </div>
            `;
            feed.prepend(div);
        }

        function renderComment(comment) {
            removeEmpty();
            const div = document.createElement('div');
            div.className = 'card reply';
            div.innerHTML = `
                <div class="card-header">
                    <span>
                        <a href="https://github.com/${comment.repo}/issues/${comment.issueNumber}" target="_blank" style="color: inherit; text-decoration: none;">
                            REPLY // ${(comment.direction || 'EN → ??').toUpperCase()}
                        </a>
                    </span>
                    <span>${formatDate(comment.timestamp)}</span>
                </div>
                <div class="card-title">Translated Response</div>
                <div class="card-body">${escape(comment.translatedBody)}</div>
                <div class="card-meta">
                    <span><strong>REPO:</strong> ${comment.repo} #${comment.issueNumber}</span>
                    <span><strong>AUTHOR:</strong> @${comment.author}</span>
                </div>
            `;
            feed.prepend(div);
        }

        function renderPlaygroundResult(data) {
            removeEmpty();
            const div = document.createElement('div');
            div.className = 'card';
            div.style.borderColor = '#fbbf24'; // Yellow border for playground
            div.innerHTML = `
                <div class="card-header">
                    <span style="color: #fbbf24">PLAYGROUND TEST // MANUAL UPLINK</span>
                    <span>${formatDate(data.timestamp)}</span>
                </div>
                <div class="card-title" style="font-size: 0.8rem; color: #6b7280; font-style: italic">Original: ${escape(data.original)}</div>
                <div class="card-body" style="border-left-color: #fbbf24">${escape(data.translated)}</div>
                <div class="card-meta">
                    <span><strong>SOURCE:</strong> MAN_INPUT</span>
                    <span style="color: #fbbf24"><strong>STATUS:</strong> SIMULATED</span>
                </div>
            `;
            feed.prepend(div);
        }

        function formatDate(ts) {
            if (!ts) return 'just now';
            const date = new Date(ts);
            if (isNaN(date.getTime())) return 'now';
            return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
        }

        function updateStats(repos, langs, health) {
            const flags = { 'hi': '🇮🇳', 'zh': '🇨🇳', 'ja': '🇯🇵', 'pt': '🇧🇷', 'de': '🇩🇪', 'es': '🇪🇸', 'fr': '🇫🇷' };
            repoList.innerHTML = repos.map(r => `
                <li class="stat-item" title="Mode: ${r.mode}">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-size: 0.8rem;"><span style="margin-right: 8px; opacity: 0.5;">📁</span> ${r.repo}</span>
                        <span style="font-size: 0.55rem; color: var(--text-dim); margin-left: 24px; opacity: 0.7;">
                            [${r.mode.toUpperCase()}] · ${(r.locales || 'en').toUpperCase()}
                        </span>
                    </div>
                    <span class="stat-val">${r.count}</span>
                </li>
            `).join('') || '<li class="empty-state">No repos...</li>';

            langList.innerHTML = langs.map(l => {
                const code = l.lang.toLowerCase();
                return `
                <li class="stat-item">
                    <span><span style="margin-right: 8px;">${flags[code] || '🌐'}</span> ${l.lang.toUpperCase()}</span>
                    <span class="stat-val">${l.count}</span>
                </li>
            `}).join('') || '<li class="empty-state">No langs...</li>';

            if (health) {
                document.getElementById('conf-val').textContent = `${health.confidence}%`;
                document.getElementById('conf-bar').style.width = `${health.confidence}%`;
                document.getElementById('cont-val').textContent = `${health.context}%`;
                document.getElementById('cont-bar').style.width = `${health.context}%`;
            }
        }

        function removeEmpty() {
            const empty = feed.querySelector('.empty-state');
            if (empty) empty.remove();
        }

        function escape(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        async function simulate() {
            const input = document.getElementById('playground');
            const btn = document.querySelector('.btn-play');
            const text = input.value;

            if (!text || btn.disabled) return;

            btn.disabled = true;
            btn.textContent = 'THINKING...';
            input.disabled = true;

            try {
                const res = await fetch('/api/playground', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Uplink failure');
                }

                input.value = '';
                input.placeholder = 'TRANSLATION SUCCESSFUL // READY FOR NEXT';
            } catch (err) {
                input.value = '';
                input.placeholder = `ERROR: ${err.message.toUpperCase()}`;
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = 'TRANSLATE';
                    input.disabled = false;
                    if (!input.value) input.placeholder = 'Paste non-English text to test translation logic...';
                }, 2000);
            }
        }

        async function connectRepo() {
            const input = document.getElementById('repo-conn');
            const msg = document.getElementById('conn-msg');
            const repo = input.value.trim();
            const locale = document.getElementById('locale-select').value;

            if (!repo) return;

            msg.textContent = 'CONNECTING...';
            msg.style.color = 'var(--primary)';
            input.disabled = true;

            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo, target_locale: locale })
                });

                const data = await res.json();

                if (res.ok) {
                    msg.textContent = '✓ SUCCESS: REPO LINKED';
                    msg.style.color = 'var(--primary)';
                    input.value = '';
                } else {
                    msg.textContent = `! ERROR: ${data.error.toUpperCase()}`;
                    msg.style.color = 'var(--danger)';
                }
            } catch (err) {
                msg.textContent = '! CONNECTION FAILED';
                msg.style.color = 'var(--danger)';
            } finally {
                setTimeout(() => {
                    input.disabled = false;
                    if (!input.value) msg.textContent = '';
                }, 4000);
            }
        }

        function clearFeed() {
            feed.innerHTML = '<div class="empty-state">FEED PURGED / WAITING FOR UPLINK</div>';
        }
    </script>
</body>

</html>
